<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ピクセルピコ カラーマッチ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <h1>ピクセルピコ カラーマッチ</h1>
  <p class="desc">
    画像をアップロード → ドラッグで画像を動かして照準に合わせ、「この位置の色を取得」ボタンで最も近いビーズ色を提案します。
  </p>

  <div class="controls">
    <input type="file" id="file" accept="image/*">
    <label class="zoom-label">
      拡大倍率:
      <input type="range" id="zoom" min="1" max="20" value="8">
      <span id="zoomVal">8</span>x
    </label>
    <label class="mode-toggle">
      <input type="checkbox" id="registerMode">
      <span>🎨 登録モード (取得でRGBを所持色登録)</span>
    </label>
  </div>

  <div id="modeBanner" class="mode-banner" style="display:none;">
    登録モード中: 照準位置のRGB色がそのまま所持色として登録されます
  </div>

  <div id="wrap">

    <!-- 左: 画像表示 -->
    <div id="left">
      <div id="viewport">
        <canvas id="canvas"></canvas>
        <!-- 照準 (マス目つき十字) -->
        <div id="reticle">
          <div class="reticle-grid"></div>
          <div class="reticle-cross-h"></div>
          <div class="reticle-cross-v"></div>
          <div class="reticle-center"></div>
        </div>
        <!-- ミニマップ -->
        <div id="minimap">
          <canvas id="minimapCanvas"></canvas>
          <div id="minimapMarker"></div>
        </div>
      </div>

      <div class="pick-area">
        <button id="pickBtn" class="btn btn-pick">🎯 この位置の色を取得</button>
        <span id="pickInfo" class="pick-info"></span>
      </div>

      <div class="hover-area">
        <span class="label">照準周辺の拡大:</span>
        <canvas id="magnifier"></canvas>
        <div id="hoverInfo"></div>
      </div>
    </div>

    <!-- 中央: クリック履歴 -->
    <div id="center">
      <div class="panel-header">
        <span class="label">取得履歴 (新しい順)</span>
        <div class="panel-btns">
          <button id="exportHistoryBtn" class="btn">📋 結果をコピー</button>
          <button id="clearHistoryBtn" class="btn btn-sub">クリア</button>
        </div>
      </div>
      <div id="history"></div>
    </div>

    <!-- 右: 所持色管理 -->
    <div id="right">
      <div class="panel-header">
        <span class="label">所持色 (<span id="ownedCount">0</span>色)</span>
        <div class="panel-btns">
          <button id="exportOwnedBtn" class="btn">📋 エクスポート</button>
          <button id="importOwnedBtn" class="btn">📥 インポート</button>
          <button id="clearOwnedBtn" class="btn btn-sub">クリア</button>
        </div>
      </div>
      <p class="hint">
        ・登録モードOFFで候補の「+追加」→ ピクセルピコのビーズ色を登録<br>
        ・登録モードONで取得ボタン → 任意のRGBを直接登録(独自色など)<br>
        ・所持色はブラウザに自動保存されます
      </p>
      <div id="ownedList"></div>
    </div>

  </div>

  <!-- インポート用モーダル -->
  <div id="importModal" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h3>所持色をインポート</h3>
      <p>エクスポートした文字列を貼り付けてください。</p>
      <textarea id="importText" rows="10" placeholder="ここに貼り付け..."></textarea>
      <div class="modal-btns">
        <button id="importConfirmBtn" class="btn">取り込む</button>
        <button id="importCancelBtn" class="btn btn-sub">キャンセル</button>
      </div>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="toast" style="display:none;"></div>

  <footer>
    <p>
      ビーズ色データ: <a href="https://www.pixelpico.com/" target="_blank" rel="noopener">ピクセルピコ</a> 公式RGBカラー対応表より
    </p>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
